# ============================================================
# application.properties
# orm-learn project - Hands on 1: Spring Data JPA Quick Example
# Handbook: spring-data-jpa-handson.docx
# ============================================================

# --- Spring Framework and application log ---
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# --- Hibernate logs for displaying executed SQL, input and output ---
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# --- Log pattern ---
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# --- Database configuration ---
# MySQL 8 JDBC driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Connect to ormlearn schema on localhost MySQL instance
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# --- Hibernate configuration ---
# validate: Checks that table and columns exist; throws exception if not found
# Run country.sql in MySQL BEFORE starting the application
spring.jpa.hibernate.ddl-auto=validate

# MySQL Dialect for Hibernate 6 (Spring Boot 3.x)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Show formatted SQL in logs (already enabled by hibernate.SQL=trace above)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
