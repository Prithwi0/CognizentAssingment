# =====================================================
# Exercise 9 - Spring Boot Application Properties
# Library Management System
# =====================================================

# --- Server Configuration ---
# Port on which the embedded Tomcat server will run
server.port=8080

# --- H2 In-Memory Database Configuration ---
# datasource.url: jdbc:h2:mem:<dbname> creates an in-memory H2 database named 'librarydb'
spring.datasource.url=jdbc:h2:mem:librarydb

# H2 JDBC Driver class
spring.datasource.driverClassName=org.h2.Driver

# Default H2 in-memory credentials
spring.datasource.username=sa
spring.datasource.password=

# H2 SQL dialect for Hibernate to generate correct SQL syntax
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- JPA / Hibernate Configuration ---
# ddl-auto=create-drop: creates schema on startup, drops it on shutdown
# Other options: none, validate, update, create
spring.jpa.hibernate.ddl-auto=create-drop

# Show the SQL generated by Hibernate in the console (useful for learning)
spring.jpa.show-sql=true

# Format the SQL output for readability
spring.jpa.properties.hibernate.format_sql=true

# --- H2 Console Configuration ---
# Enable the H2 browser-based console at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# URL path for the H2 console
spring.h2.console.path=/h2-console

# Allow remote access to the H2 console (needed for some environments)
spring.h2.console.settings.web-allow-others=true

# --- Application Name ---
spring.application.name=LibraryManagement
